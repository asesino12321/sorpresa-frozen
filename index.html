<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Princesa ❄️</title>
    <style>
        /* --- CONFIGURACIÓN BASE Y FONDO ANIMADO --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #74ebd5);
            background-size: 400% 400%;
            animation: gradienteFondo 15s ease infinite;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            perspective: 1000px; /* Habilita efectos 3D en la pantalla */
        }

        @keyframes gradienteFondo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- COPOS DE NIEVE FLOTANTES (EFECTO FROZEN) --- */
        .copo {
            position: absolute;
            top: -10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            user-select: none;
            pointer-events: none;
            animation: caida Nieva linear infinite;
        }

        @keyframes caida {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* --- CONTENEDOR EFECTO CRISTAL 3D (GLASSMORPHISM) --- */
        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 0 20px rgba(255, 255, 255, 0.1);
            transform: translateZ(0);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            z-index: 10;
        }

        .container:hover {
            transform: scale(1.02) rotateX(2deg);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.2);
        }

        /* --- TEXTOS --- */
        h1 {
            font-size: 26px;
            background: linear-gradient(to right, #ffffff, #a5f3fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(255,255,255,0.1);
        }

        p {
            color: #e2e8f0;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* --- ENTRADAS Y BOTONES ESTILO PREMIUM --- */
        .grupo-input { position: relative; margin-bottom: 20px; }

        input[type="password"] {
            width: 100%;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        input[type="password"]:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            background: rgba(0, 0, 0, 0.3);
        }

        button {
            background: linear-gradient(135deg, #38bdf8 0%, #0369a1 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(3, 105, 161, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.6);
        }

        #mensaje-error {
            color: #f87171;
            font-weight: 600;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }

        /* --- SECCIÓN OCULTA (CARTA) --- */
        #contenido-secreto { display: none; opacity: 0; transition: opacity 0.8s ease; }
        
        .carta {
            color: #f1f5f9;
            font-size: 15px;
            line-height: 1.7;
            text-align: left;
            white-space: pre-wrap;
            background: rgba(0, 0, 0, 0.15);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 35px;
            max-height: 250px;
            overflow-y: auto
